[build]
  # Comando para build do projeto
  command = "pnpm build"
  
  # Diretório onde ficam os arquivos buildados
  publish = "dist"
  
  # Variáveis de ambiente para o build
  environment = { NODE_VERSION = "22", SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY" }

[build.processing]
  # Otimizações automáticas do Netlify
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Redirecionamentos para SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Configurações específicas para desenvolvimento
[context.deploy-preview]
  command = "pnpm build"

[context.branch-deploy]
  command = "pnpm build"

# Configurações para produção
[context.production]
  command = "pnpm build"